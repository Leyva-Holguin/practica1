<!DOCTYPE html>
<html lang="en-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Gestor de tareas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div class="container-fluid px-0">
        <header>
            <nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
                <div class="container-fluid px-3">
                    <a class="navbar-brand fw-bold"><i class="bi bi-check2-square me-2"></i>Gestor de tareas</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                    {% if session.get('logueado') %}
                    <div class="collapse navbar-collapse" id="navbarNavDropdown">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item"><a class="nav-link text-light" href="{{ url_for('add') }}"><i class="bi bi-list-check me-1"></i>Mis Tareas </a></li>
                            <li class="nav-item dropdown"><a class="nav-link dropdown-toggle text-light" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false"><i class="bi bi-person-circle me-1"></i>{{ session.get('usuario', 'Usuario') }}</a>
                                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                                    <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                    {% else %}
                    <div class="collapse navbar-collapse" id="navbarNavDropdown">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item"><a class="nav-link text-light" href="{{ url_for('iniciar') }}"><i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión</a></li>
                            <li class="nav-item"><a class="nav-link text-light" href="{{ url_for('registro') }}"><i class="bi bi-person-plus me-1"></i>Registrarse</a></li>
                        </ul>
                    </div>
                    {% endif %}
                </div>
            </nav>
        </header>
        <main class="py-4">
            <div class="container">
                {% block contenido %}
                {% endblock %}
            </div>
        </main>
        <footer class="bg-dark text-light py-4 mt-auto">
            <div class="container text-center">
                <div class="row">
                    <div class="col-12">
                        <i class="bi bi-file-text-fill me-2"></i>
                        <h6 class="d-inline-block mb-0">Gestor de Tareas y Documentos</h6>
                        <div class="mt-2">
                            <small class="text-light-emphasis"><i class="bi bi-c-circle me-1"></i>Derechos reservados 2026</small>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
